appId: com.easyfbx2vrma.app
productName: EasyFBX2VRMA
directories:
  output: dist
  buildResources: assets

files:
  - electron/**/*
  - binaries/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: binaries
    to: binaries
    filter:
      - "**/*"

# Skip signing for external binaries
asarUnpack:
  - "**/binaries/**/*"
  - "binaries/**/*"

win:
  target:
    - portable
  forceCodeSigning: false
  signAndEditExecutable: false

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  category: public.app-category.utilities

linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file