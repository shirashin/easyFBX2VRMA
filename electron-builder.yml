appId: com.easyfbx2vrma.app
productName: EasyFBX2VRMA
directories:
  output: out
  buildResources: assets

files:
  - dist/**/*
  - electron/**/*
  - binaries/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: binaries
    to: binaries
    filter:
      - "**/*"

win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
  forceCodeSigning: false
  signExts: []

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  category: public.app-category.utilities

linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file