<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyFBX2VRMA Converter</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
}

.container {
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  max-width: 500px;
  width: 100%;
  margin: 20px;
}

h1 {
  text-align: center;
  color: #333;
  margin-bottom: 30px;
  font-size: 24px;
}

.drop-zone {
  border: 3px dashed #ccc;
  border-radius: 15px;
  padding: 60px 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: #fafafa;
}

.drop-zone:hover {
  border-color: #667eea;
  background: #f5f5ff;
}

.drop-zone.dragover {
  border-color: #667eea;
  background: #f0f0ff;
  transform: scale(1.02);
}

.drop-zone-content {
  pointer-events: none;
}

.icon {
  color: #667eea;
  margin-bottom: 20px;
}

.drop-text {
  font-size: 18px;
  color: #555;
  margin-bottom: 10px;
}

.drop-subtext {
  font-size: 14px;
  color: #999;
}

.progress-section {
  margin-top: 30px;
}

.file-info {
  margin-bottom: 15px;
  font-size: 14px;
  color: #666;
}

.progress-bar {
  height: 8px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 10px;
  width: 0%;
  transition: width 0.3s ease;
}

.progress-status {
  font-size: 14px;
  color: #666;
  text-align: center;
}

.result-section,
.error-section {
  margin-top: 30px;
  text-align: center;
}

.success-message,
.error-message {
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.success-message {
  background: #f0fff4;
  color: #22c55e;
}

.error-message {
  background: #fef2f2;
  color: #ef4444;
}

.icon.success {
  color: #22c55e;
}

.icon.error {
  color: #ef4444;
}

.output-path {
  font-size: 12px;
  color: #666;
  margin-top: 10px;
  word-break: break-all;
}

.error-detail {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}

.btn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn:active {
  transform: translateY(0);
}

.hidden {
  display: none;
}

.preview-section {
  margin: 20px 0;
  padding: 20px;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  background: #f9f9f9;
}

.preview-section h3 {
  margin: 0 0 15px 0;
  color: #333;
  font-size: 18px;
  text-align: center;
}

.vrm-viewer {
  width: 100%;
  height: 300px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #222;
  margin-bottom: 15px;
  position: relative;
}

.viewer-controls {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn-small {
  padding: 8px 16px;
  font-size: 14px;
}
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <h1>FBX to VRMA Converter</h1>
      
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-content">
          <svg class="icon" viewBox="0 0 24 24" width="64" height="64">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="currentColor"/>
          </svg>
          <p class="drop-text">Drag and drop FBX file here</p>
          <p class="drop-subtext">or click to browse</p>
          <input type="file" id="file-input" accept=".fbx" hidden>
        </div>
      </div>

      <div id="progress-section" class="progress-section hidden">
        <div class="file-info">
          <span id="file-name"></span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="progress-status">
          <span id="status-text">Processing...</span>
        </div>
      </div>

      <div id="result-section" class="result-section hidden">
        <div class="success-message">
          <svg class="icon success" viewBox="0 0 24 24" width="48" height="48">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="currentColor"/>
          </svg>
          <p>Conversion successful!</p>
          <p id="output-path" class="output-path"></p>
        </div>
        
        <div class="preview-section">
          <h3>Animation Preview</h3>
          <div id="vrm-viewer" class="vrm-viewer"></div>
          <div class="viewer-controls">
            <button id="play-animation" class="btn btn-small">Play Animation</button>
            <button id="pause-animation" class="btn btn-small">Pause</button>
            <button id="reset-animation" class="btn btn-small">Reset</button>
          </div>
        </div>
        
        <button id="convert-another" class="btn">Convert Another File</button>
      </div>

      <div id="error-section" class="error-section hidden">
        <div class="error-message">
          <svg class="icon error" viewBox="0 0 24 24" width="48" height="48">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/>
          </svg>
          <p>Conversion failed</p>
          <p id="error-message" class="error-detail"></p>
        </div>
        <button id="try-again" class="btn">Try Again</button>
      </div>
    </div>
  </div>
  
  <script src="./renderer.js"></script>
</body>
</html>
